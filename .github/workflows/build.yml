name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: m5uploader-linux
          - os: windows-latest
            asset_name: m5uploader-windows.exe
          - os: macos-latest
            asset_name: m5uploader-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Smoke test import
        run: python -c "import m5uploader.api, m5uploader.auth_store, m5uploader.config, m5uploader.imaging, m5uploader.gui, m5uploader.flashing, m5uploader.catalog_cache, m5uploader.update_check"

      # esptool (GPLv2+) is only ever invoked as an isolated subprocess by
      # the main app (see m5uploader/flashing.py, THIRD_PARTY_LICENSES.md)
      # - never imported into it. In frozen builds that means a second,
      # separate PyInstaller executable, built from esptool_helper.py and
      # shipped alongside the main binary, which m5uploader/flashing.py
      # locates next to sys.executable at runtime.
      #
      # keyring's backend discovery is entry-point/importlib.metadata based,
      # which PyInstaller's static analysis can miss - each OS build below
      # explicitly hidden-imports its own concrete backend module (also
      # explicitly selected at runtime in auth_store.py) rather than relying
      # on auto-discovery working inside a frozen build.

      - name: Build standalone executable (Windows)
        if: runner.os == 'Windows'
        # Building on a fresh, ephemeral CI runner (rather than a local
        # machine) means the binary never embeds a developer's own
        # username or home directory path.
        # PIL.ImageTk registers its Tk photo-image support by synthesizing
        # PIL._tkinter_finder in sys.modules at runtime, so PyInstaller's
        # static analysis never sees the import and leaves it out of the
        # bundle unless it's listed explicitly.
        # The esptool helper ships as a second .exe next to the main one -
        # both get zipped together so the release is still a single
        # download, matching the "one file" experience of the other OSes.
        run: |
          pyinstaller --onefile --windowed --name "${{ matrix.asset_name }}" --hidden-import PIL._tkinter_finder --hidden-import keyring.backends.Windows --distpath dist run.py
          pyinstaller --onefile --console --name "m5uploader-esptool.exe" --distpath dist esptool_helper.py

          Compress-Archive -Path "dist/${{ matrix.asset_name }}","dist/m5uploader-esptool.exe" -DestinationPath "dist/m5uploader-windows.zip"
          Remove-Item "dist/${{ matrix.asset_name }}","dist/m5uploader-esptool.exe"

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        # Same PyInstaller invocation as Windows, but the raw output is a
        # bare, extensionless file - not obviously a program, and GitHub
        # release downloads don't carry the executable bit either, so it'd
        # need a manual chmod +x on top. AppImage is the standard fix on
        # Linux: one recognizable, self-contained file, and "chmod +x it,
        # run it" is a convention most Linux users already know.
        # The esptool helper is built the same way and placed in the same
        # AppDir/usr/bin, so it ships inside the one AppImage file too.
        run: |
          pyinstaller --onefile --windowed --name "${{ matrix.asset_name }}" --hidden-import PIL._tkinter_finder --hidden-import keyring.backends.SecretService --distpath dist run.py
          pyinstaller --onefile --console --name "m5uploader-esptool" --distpath dist esptool_helper.py

          mkdir -p AppDir/usr/bin
          cp "dist/${{ matrix.asset_name }}" "AppDir/usr/bin/${{ matrix.asset_name }}"
          cp "dist/m5uploader-esptool" "AppDir/usr/bin/m5uploader-esptool"
          chmod +x "AppDir/usr/bin/${{ matrix.asset_name }}" "AppDir/usr/bin/m5uploader-esptool"

          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "${0}")")"' \
            'exec "$HERE/usr/bin/${{ matrix.asset_name }}" "$@"' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=m5uploader' \
            'Exec=AppRun' \
            'Icon=m5uploader' \
            'Categories=Utility;' \
            > AppDir/m5uploader.desktop

          python3 -c "import base64; from ttkbootstrap.icons import Icon; open('AppDir/m5uploader.png', 'wb').write(base64.b64decode(Icon.icon))"

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "dist/${{ matrix.asset_name }}.AppImage"

          rm "dist/${{ matrix.asset_name }}" "dist/m5uploader-esptool"

      - name: Build app bundle (macOS)
        if: runner.os == 'macOS'
        # --onefile + --windowed on macOS is deprecated by PyInstaller: a
        # .app bundle can't be a single file, it fights Gatekeeper/notarization,
        # and PyInstaller turns this into a hard error in v7.0. --onedir is
        # what a windowed macOS build is actually supposed to use. The
        # resulting .app is a directory, so it gets zipped for distribution -
        # a bare Mach-O extracted from Contents/MacOS loses the icon,
        # Info.plist, and bundle structure entirely.
        # --onedir builds both the plain onedir tree at dist/<name>/ and the
        # .app bundle wrapping it at dist/<name>.app/ - only the zipped
        # bundle should ship, so the loose onedir tree is removed too.
        # The esptool helper is copied into the bundle's own Contents/MacOS
        # so it ships inside the one .app/.zip too.
        run: |
          pyinstaller --onedir --windowed --name "${{ matrix.asset_name }}" --hidden-import PIL._tkinter_finder --hidden-import keyring.backends.macOS --distpath dist run.py
          pyinstaller --onefile --console --name "m5uploader-esptool" --distpath dist esptool_helper.py
          cp "dist/m5uploader-esptool" "dist/${{ matrix.asset_name }}.app/Contents/MacOS/m5uploader-esptool"
          chmod +x "dist/${{ matrix.asset_name }}.app/Contents/MacOS/m5uploader-esptool"
          ditto -c -k --sequesterRsrc --keepParent "dist/${{ matrix.asset_name }}.app" "dist/${{ matrix.asset_name }}.zip"
          rm -rf "dist/${{ matrix.asset_name }}.app" "dist/${{ matrix.asset_name }}" "dist/m5uploader-esptool"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" $(find dist -type f) --clobber --repo "$GITHUB_REPOSITORY"
